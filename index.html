<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Detailed Statement by Cost Dimension</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Login gate -->
  <div class="login-bg" id="loginBg">
    <div class="login">
      <h1 data-t="text.login.title">Statement of Account</h1>
      <p data-t="text.login.subtitle">Sign in to view the reports.</p>
      <div class="tabs">
        <button class="tab active" id="tab-pw" data-t="text.login.tabPw">Username &amp; password</button>
        <button class="tab" id="tab-phone" data-t="text.login.tabPhone">Phone code</button>
      </div>
      <div id="pane-pw">
        <label for="user-in" data-t="text.login.username">Username</label>
        <input id="user-in" type="text" autocomplete="username" data-tp="text.placeholders.username" placeholder="username">
        <label for="pass-in" data-t="text.login.password" style="margin-top:10px">Password</label>
        <input id="pass-in" type="password" autocomplete="current-password" data-tp="text.placeholders.password" placeholder="password">
        <button class="btn" id="pwLogin" data-t="text.login.signIn">Sign in</button>
      </div>
      <div id="pane-phone" style="display:none">
        <div id="step-phone">
          <label for="phone-in" data-t="text.login.phoneLabel">Phone number</label>
          <input id="phone-in" type="tel" inputmode="tel" value="+965" autocomplete="tel" data-tp="text.placeholders.phone" placeholder="+965 5000 0000">
          <div class="hint" data-t="text.login.phoneHint">Include your country code.</div>
          <button class="btn" id="sendCode" data-t="text.login.sendCode">Send code</button>
        </div>
        <div id="step-code" style="display:none">
          <label for="code-in" data-t="text.login.codeLabel">Enter the 6-digit code</label>
          <input id="code-in" type="text" inputmode="numeric" maxlength="6" autocomplete="one-time-code" data-tp="text.placeholders.code" placeholder="••••••">
          <button class="btn" id="verifyCode" data-t="text.login.verify">Verify &amp; sign in</button>
          <button class="back" id="changeNumber" data-t="text.login.changeNumber" style="margin-top:12px">← Use a different number</button>
        </div>
      </div>
      <div class="msg" id="login-msg"></div>
      <button class="back" id="openAdmin" data-t="text.buttons.adminLink" style="margin-top:18px">⚙ Admin</button>
    </div>
  </div>

  <!-- Admin modal -->
  <div class="modal-bg" id="adminBg">
    <div class="modal" style="width:560px">
      <h2 data-t="text.admin.title">Approved users</h2>
      <p data-t="text.admin.desc"></p>
      <div class="row">
        <label data-t="text.admin.uploadKey">Upload key</label>
        <input id="adminKey" type="password" autocomplete="off" data-tp="text.placeholders.uploadKey" placeholder="upload key">
      </div>
      <div id="adminBody" style="display:none">
        <div style="display:flex; gap:8px; align-items:flex-end; margin-bottom:10px;">
          <div class="row" style="flex:1; margin:0;"><label data-t="text.admin.name">Name</label><input id="newLabel" data-tp="text.placeholders.newName"></div>
          <div class="row" style="flex:1; margin:0;"><label data-t="text.admin.phone">Phone</label><input id="newPhone" type="tel" value="+965" data-tp="text.placeholders.newPhone"></div>
          <button class="btn" id="addUser" data-t="text.admin.add" style="white-space:nowrap">+ Add</button>
        </div>
        <table id="userTable"></table>
        <hr style="margin:18px 0; border:0; border-top:1px solid #e2e8ee;">
        <h2 data-t="text.admin.loginsTitle" style="margin:0 0 2px; font-size:13px;">Username / password accounts</h2>
        <p data-t="text.admin.loginsDesc" style="margin:0 0 10px;"></p>
        <div style="display:flex; gap:8px; align-items:flex-end; margin-bottom:10px; flex-wrap:wrap;">
          <div class="row" style="flex:1; margin:0; min-width:110px;"><label data-t="text.admin.username">Username</label><input id="newUser" autocomplete="off" data-tp="text.placeholders.newUser"></div>
          <div class="row" style="flex:1; margin:0; min-width:110px;"><label data-t="text.admin.password">Password</label><input id="newPass" type="text" autocomplete="off" data-tp="text.placeholders.newPass"></div>
          <div class="row" style="flex:1; margin:0; min-width:110px;"><label data-t="text.admin.nameOptional">Name (optional)</label><input id="newUserLabel" autocomplete="off" data-tp="text.placeholders.newUserName"></div>
          <button class="btn" id="addLogin" data-t="text.admin.create" style="white-space:nowrap">+ Create</button>
        </div>
        <table id="loginTable"></table>
      </div>
      <div class="msg" id="admin-msg"></div>
      <div class="modal-actions">
        <button class="btn ghost" id="closeAdmin" data-t="text.admin.close">Close</button>
        <button class="btn" id="unlockAdmin" data-t="text.admin.unlock">Unlock</button>
      </div>
    </div>
  </div>

  <!-- Upload modal -->
  <div class="modal-bg" id="modalBg">
    <div class="modal">
      <h2 data-t="text.upload.title">Upload</h2>
      <p data-t="text.upload.desc"></p>
      <div class="row">
        <label data-t="text.upload.fileLabel">Excel file (.xlsx)</label>
        <div class="drop" id="drop"></div>
        <input id="file" type="file" accept=".xlsx" style="display:none">
      </div>
      <div class="row">
        <label data-t="text.admin.uploadKey">Upload key</label>
        <input id="key" type="password" autocomplete="off" data-tp="text.placeholders.uploadKey" placeholder="upload key">
      </div>
      <div class="msg" id="msg"></div>
      <div class="modal-actions">
        <button class="btn ghost" id="cancelUpload" data-t="text.upload.cancel">Cancel</button>
        <button class="btn" id="doUpload" data-t="text.upload.submit" disabled>Upload</button>
      </div>
    </div>
  </div>

  <!-- Top chrome bar -->
  <div class="topbar">
    <div class="tb-left">
      <span class="tb-logo" data-t="brand.topLogo">AN</span>
      <button class="org"><span data-t="brand.org"></span> <span>▾</span></button>
    </div>
    <div class="tb-right">
      <button class="b b-ghost" id="uploadBtn" data-t="text.buttons.upload">Upload</button>
      <button class="b b-ghost" id="adminBtn" data-t="text.buttons.users">Users</button>
      <button class="icon-btn" id="themeToggle" title="Toggle theme">☀</button>
      <span class="cur" data-t="brand.currency"></span>
      <button class="b b-ghost" id="logout" data-t="text.buttons.signOut">Sign out</button>
    </div>
  </div>

  <!-- Page header -->
  <div class="pagehead">
    <div>
      <h1 class="page-title" data-t="report.title">Detailed Statement by Cost Dimension</h1>
      <div class="page-sub" data-t="report.subtitle"></div>
    </div>
    <div class="report-search">
      <input id="reportSearch" data-tp="text.placeholders.reportSearch" placeholder="Search for a report...">
      <span>🔍</span>
    </div>
  </div>

  <!-- Filter panel -->
  <section class="panel">
    <div class="fgrid">
      <div class="field">
        <label><span data-t="text.labels.costDimension">Cost Dimension</span> <i class="info" data-ttitle="text.tooltips.costDimension">i</i></label>
        <div class="ms">
          <button type="button" class="ms-box" id="dimBox"><span id="dimCount">All</span><span>▾</span></button>
          <div class="ms-menu" id="dimMenu"></div>
        </div>
        <div class="chips" id="dimChips"></div>
      </div>
      <div class="field">
        <label data-t="text.labels.project">Project Name Contains</label>
        <input id="proj" list="projlist" autocomplete="off" data-tp="text.placeholders.project">
        <datalist id="projlist"></datalist>
      </div>
      <div class="field">
        <label data-t="text.labels.voucherNo">Voucher No (List or Range)</label>
        <input id="vno" autocomplete="off" data-tp="text.placeholders.voucherNo">
      </div>
      <div class="field">
        <label data-t="text.labels.voucherType">Voucher Type</label>
        <select id="vtype"></select>
      </div>
      <div class="field">
        <label data-t="text.labels.side">Side</label>
        <select id="side"></select>
      </div>
    </div>

    <div class="fgrid" id="row2">
      <div class="field">
        <label data-t="text.labels.search">Search (Memo / Ref / Type)</label>
        <input id="search" autocomplete="off" data-tp="text.placeholders.search">
      </div>
      <div class="field"><label data-t="text.labels.fromDate">From Date</label><input id="from" type="date"></div>
      <div class="field"><label data-t="text.labels.toDate">To Date</label><input id="to" type="date"></div>
    </div>

    <div class="factions">
      <button class="b b-outline" id="reset" data-t="text.buttons.reset">Reset</button>
      <span class="spacer"></span>
      <button class="b b-outline" id="moreFilters" data-t="text.buttons.moreFilters">More Filters</button>
      <button class="b b-primary" id="apply" data-t="text.buttons.applyFilters">Apply Filters</button>
    </div>
  </section>

  <!-- Summary strip -->
  <div class="summary" id="summary">
    <div class="sicon">📊</div>
    <div class="stat first"><div class="lbl" data-t="text.summary.dimensions">Cost dimensions</div><div class="val" id="s-dims">—</div></div>
    <div class="stat"><div class="lbl" data-t="text.summary.projects">Projects</div><div class="val" id="s-proj">—</div></div>
    <div class="stat"><div class="lbl" data-t="text.summary.transactions">Transactions</div><div class="val" id="s-tx">—</div></div>
    <div class="stat"><div class="lbl" data-t="text.summary.debit">Debit</div><div class="val deb" id="s-deb">—</div></div>
    <div class="stat"><div class="lbl" data-t="text.summary.credit">Credit</div><div class="val cred" id="s-cred">—</div></div>
    <div class="stat"><div class="lbl" data-t="text.summary.net">Net</div><div class="val" id="s-net">—</div></div>
    <div class="status" id="status">Loading…</div>
  </div>

  <!-- Report viewer toolbar -->
  <div class="vtoolbar">
    <div class="vnav">
      <button class="vbtn" id="firstPage" title="Top">⏮</button>
      <button class="vbtn" id="prevPage" title="Up">‹</button>
      <span class="vpage">Page <b>1</b> of <b>1</b></span>
      <button class="vbtn" id="nextPage" title="Down">›</button>
      <button class="vbtn" id="lastPage" title="Bottom">⏭</button>
      <button class="vbtn" id="vrefresh" title="Refresh">↻</button>
    </div>
    <select id="zoom" class="vzoom">
      <option value="0.6">60%</option><option value="0.8">80%</option>
      <option value="1" selected>100%</option><option value="1.25">125%</option><option value="1.5">150%</option>
    </select>
    <div class="vdrop">
      <button class="vbtn wide" id="saveAs" data-t="text.buttons.saveAs">Save as</button>
      <div class="vmenu" id="saveMenu">
        <button data-fmt="pdf"><span class="fi pdf">PDF</span> <span data-t="text.save.pdf">PDF</span></button>
        <button data-fmt="excel"><span class="fi xls">XLS</span> <span data-t="text.save.excel">Excel</span></button>
        <button data-fmt="word"><span class="fi doc">DOC</span> <span data-t="text.save.word">Word</span></button>
      </div>
    </div>
    <button class="vbtn wide" id="print" data-t="text.buttons.print">Print</button>
    <input id="vfind" class="vfind" data-tp="text.placeholders.find" placeholder="Find">
    <button class="vbtn" id="vfindNext" data-t="text.buttons.findNext">Find | Next</button>
  </div>

  <!-- Document -->
  <div class="docwrap" id="docwrap">
    <div class="doc" id="doc">
      <div class="letterhead">
        <img class="lh-logo" id="lhLogo" src="logo.png" alt="Arizona National">
        <div class="lh-brand">
          <div class="lh-ar" dir="rtl" data-t="brand.arabicName"></div>
          <div class="lh-ar-sub" dir="rtl" data-t="brand.arabicSub"></div>
          <div class="lh-en" data-t="brand.englishName"></div>
          <div class="lh-en-sub" data-t="brand.englishSub"></div>
        </div>
      </div>
      <div class="lh-report-title" data-t="report.title"></div>
      <div class="doc-meta" id="docMeta"></div>
      <div id="printHeader" class="print-only"></div>
      <div id="report"></div>
      <div class="print-footer print-only">
        <span data-t="brand.companyFull"></span>
        <span id="printDate"></span>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
